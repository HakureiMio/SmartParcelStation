# Core runtime
CONFIG_MAIN_STACK_SIZE=768
CONFIG_HEAP_MEM_POOL_SIZE=256

# Logging
CONFIG_LOG=n
CONFIG_USE_SEGGER_RTT=n
CONFIG_LOG_BACKEND_RTT=n

# BLE Peripheral for the first real hardware loop.
CONFIG_BT=y
CONFIG_BT_PERIPHERAL=y
CONFIG_BT_DEVICE_NAME="SPS-F02-20260611-0001"
CONFIG_BT_MAX_CONN=1

# GPIO / PWM / ADC hardware validation
CONFIG_GPIO=y
CONFIG_PWM=y
CONFIG_ADC=y
CONFIG_CLOCK_CONTROL_NRF_K32SRC_RC=y
# CONFIG_CLOCK_CONTROL_NRF_K32SRC_XTAL is not set

# Workqueue and debug
CONFIG_SYSTEM_WORKQUEUE_STACK_SIZE=768
CONFIG_ASSERT=n
