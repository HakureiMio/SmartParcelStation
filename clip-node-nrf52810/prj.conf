# 基础配置
CONFIG_MAIN_STACK_SIZE=2048
CONFIG_HEAP_MEM_POOL_SIZE=1024

# 日志
CONFIG_LOG=y
CONFIG_LOG_DEFAULT_LEVEL=3
CONFIG_USE_SEGGER_RTT=y
CONFIG_LOG_BACKEND_RTT=y

# 先关闭 BLE 协议栈以确保骨架可编译，后续再按内存评估开启
CONFIG_BT=n

# GPIO / PWM / ADC
CONFIG_GPIO=y
CONFIG_PWM=y
CONFIG_ADC=y

# 定时与功耗
CONFIG_PM=y
CONFIG_SYSTEM_WORKQUEUE_STACK_SIZE=1536

# 调试建议（按需关闭）
CONFIG_ASSERT=y
