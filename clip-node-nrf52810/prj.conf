# Core runtime
CONFIG_MAIN_STACK_SIZE=2048
CONFIG_HEAP_MEM_POOL_SIZE=1024

# RTT logging
CONFIG_LOG=y
CONFIG_LOG_DEFAULT_LEVEL=3
CONFIG_USE_SEGGER_RTT=y
CONFIG_LOG_BACKEND_RTT=y

# Keep the real BLE stack disabled for this hardware bring-up stage.
# ble_clip_service keeps a mock command/event boundary for later GATT replacement.
CONFIG_BT=n

# GPIO / PWM / ADC hardware validation
CONFIG_GPIO=y
CONFIG_PWM=y
CONFIG_ADC=y

# Workqueue and debug
CONFIG_SYSTEM_WORKQUEUE_STACK_SIZE=1536
CONFIG_ASSERT=y
